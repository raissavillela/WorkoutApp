   GIFs demonstrativos vindos da API workoutxapp via proxy /api/exercise-media.
   Nunca exibido para exercícios de Cardio. */
const _media={}; /* normalizedName -> {state:'loading'|'ok'|'miss'|'err', data} */
function _normName(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function _safeId(k){return k.replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'_');}
function fetchMedia(ptName){
  const k=_normName(ptName);
  if(_media[k])return;
  _media[k]={state:'loading'};
  fetch('/api/exercise-media?name='+encodeURIComponent(ptName))
    .then(r=>r.json().then(j=>({ok:r.ok,status:r.status,j})))
    .then(({ok,status,j})=>{
      if(!ok){
        _media[k]={state:status===503?'noapi':'err',msg:j&&j.message||j&&j.error||''};
      }else if(j.gifUrl){
        _media[k]={state:'ok',data:j};
      }else{
        _media[k]={state:'miss'};
      }
      render();
    })
    .catch(e=>{_media[k]={state:'err',msg:String(e)};render();});
}
function getMedia(ptName){return _media[_normName(ptName)];}
function toggleExpand(stId,ei,ptName){
  const k=stId+'-'+ei;
  if(S.expanded[k]){delete S.expanded[k];render();return;}
  S.expanded[k]=true;
  if(ptName)fetchMedia(ptName);
  render();
}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
const EPM={cardio:1,metabolico:2,core:2,crossfit:2,funcional:2,musculacao:2};
function buildGP(mod){const r={};(GEN[mod]||[]).forEach(ex=>{const g=ex.g||'g';r[g]=r[g]||[];r[g].push(ex);});return r;}
function generateWorkout(mods,num){
  const gp={},ug={};
  mods.forEach(mod=>{if(GEN[mod]&&GEN[mod][0]&&GEN[mod][0].g){gp[mod]=buildGP(mod);ug[mod]=[];}});
  const pools={},used={};mods.forEach(mod=>{pools[mod]=shuffle(GEN[mod]||[]);used[mod]=0;});
  function pickSeq(mod,n){const r=[];for(let i=0;i<n;i++){if(used[mod]>=pools[mod].length){pools[mod]=shuffle(GEN[mod]||[]);used[mod]=0;}if(pools[mod].length>0)r.push({...pools[mod][used[mod]++],modality:mod});}return r;}
  function pickGrp(mod,n){const allG=Object.keys(gp[mod]);const av=allG.filter(g=>ug[mod].indexOf(g)===-1);const pool=av.length>0?av:allG;const cg=pool[Math.floor(Math.random()*pool.length)];ug[mod].push(cg);if(ug[mod].length>=allG.length)ug[mod]=[];return shuffle(gp[mod][cg]).slice(0,Math.min(n,gp[mod][cg].length)).map(ex=>({...ex,modality:mod}));}
  return Array.from({length:num},(_,i)=>{const exercises=[];mods.forEach(mod=>{const n=EPM[mod]||2;exercises.push(...(gp[mod]?pickGrp(mod,n):pickSeq(mod,n)));});return{id:i+1,sets:3,exercises};});
}

function _allExerciseRows(){
  const rows={};
  WDB.forEach(w=>w.s.forEach(st=>(st.e||[]).forEach(ex=>{
    if(!ex||!ex.n||ex.m==='cardio')return;
    const k=_normName(ex.n);
    if(!rows[k])rows[k]={name:ex.n,modalities:new Set()};
    rows[k].modalities.add(ex.m);
  })));
  Object.keys(GEN).forEach(mod=>{
    if(mod==='cardio')return;
    (GEN[mod]||[]).forEach(ex=>{
      if(!ex||!ex.n)return;
      const k=_normName(ex.n);
      if(!rows[k])rows[k]={name:ex.n,modalities:new Set()};
      rows[k].modalities.add(mod);
    });
  });
  return Object.keys(rows).sort().map(k=>({key:k,name:rows[k].name,modalities:[...rows[k].modalities]}));
}

  if(S.setupSel.length===0||S.setupDur===null)return;
  const n=S.setupDur===30?4:5;
  S.wNum=n;
  const origMusc=GEN.musculacao;
  if(S.setupMuscGrp.length>0&&S.setupSel.indexOf(musculacao)>-1){
    const filtered=GEN.musculacao.filter(ex=>S.setupMuscGrp.indexOf(MUSC_EX_GRP[ex.n])>-1);
    GEN.musculacao=filtered.length>0?filtered:origMusc;
  }
  S.workout=generateWorkout(S.setupSel,n);
  GEN.musculacao=origMusc;
  S.wMods=[...S.setupSel];S.wTitle=t('wTitleBuild');S.wSub=S.setupDur+'min / '+n+' '+t('blocks')+' / 3 sets';S.isPre=false;S.done={};S.weights={};S.screen='workout';render();

        }else if(md.state==='noapi'){
          mediaHtml='<div style="padding:14px"><div style="padding:14px;text-align:center;color:#9C8F80;font-size:11px;background:#171410;border-radius:10px;border:1px dashed #302820">'+t('apiMissing')+'</div></div>';
        }else{
          mediaHtml='<div style="padding:14px"><div style="padding:14px;text-align:center;color:#9C8F80;font-size:11px;background:#171410;border-radius:10px;border:1px dashed #302820">'+t('noMedia')+'</div></div>';
        }
      }
      const toggleBtn=isCardio?'':'<button onclick="toggleExpand('+st.id+','+ei+",'"+ptName.replace(/'/g,"\\'")+"'"+')" style="margin-top:8px;background:'+(isExp?'#191510':'transparent')+';color:'+(m?m.c:'#888')+';border:1px solid '+(isExp?(m?m.c:'#333'):'#272118')+';border-radius:8px;padding:5px 10px;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer">'+(isExp?t('hideExec'):t('showExec'))+'</button>';
      return '<div style="border-bottom:'+(ei<exs.length-1?'1px solid #211C13':'none')+'">'
        +'<div style="padding:10px 14px">'
        +(m?'<div style="font-size:9px;font-weight:700;color:'+m.c+';margin-bottom:3px">'+m.e+' '+mLabel(m).toUpperCase()+'</div>':'')
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'
        +'<div style="flex:1"><div style="font-size:12px;font-weight:600;line-height:1.4;color:#ddd">'+dispName+'</div>'
        +(ex.note?'<div style="font-size:9px;color:#9C8F80;margin-top:1px">'+ex.note+'</div>':'')+'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:13px;font-weight:900;color:'+(m?m.c:'#aaa')+'">'+(ex.r||ex.metric||'')+'</div>'
        +'<div onclick="editWeight('+st.id+','+ei+')" style="font-size:9px;color:#9C8F80;margin-top:2px;cursor:pointer">🏋 <span style="border-bottom:1px dashed #444">'+(cw||'— kg')+'</span></div>'
        +'</div></div>'
        +toggleBtn
        +'</div>'
        +mediaHtml
        +'</div>';
    }).join('');
    return '<div style="border-radius:16px;border:1px solid '+(done?'#1c4a2c':'#272118')+';background:'+(done?'#081508':'#1F1C18')+';overflow:hidden;margin-bottom:10px"><div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #231E15"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:22px;font-weight:900;color:'+(done?'#2ED573':'#3A3028')+'">'+String(idx+1).padStart(2,'0')+'</span><span style="font-size:9px;font-weight:800;padding:2px 8px;border-radius:99px;background:'+(done?'#2ED573':'#272118')+';color:'+(done?'#000':'#555')+'">'+(done?'OK':st.sets+' '+t('sets'))+'</span></div>'+(done?'':'<div style="display:flex;gap:5px">'+setBtns+'</div>')+'</div>'+exHtml+'</div>';
  }).join('');
  const compHtml=allDone?'<div style="border-radius:16px;border:1px solid rgba(46,213,115,.4);background:#051005;padding:26px 18px;text-align:center;margin-top:4px"><div style="font-size:40px;margin-bottom:8px">🎉</div><div style="font-size:18px;font-weight:900;color:#2ED573">'+t('workoutDone')+'</div><div style="color:#2a6a3a;font-size:12px;margin-top:5px">'+t('workoutDoneMsg')+'</div><button onclick="navTo(home)" style="margin-top:18px;background:#2ED573;color:#000;border-radius:10px;padding:11px 24px;font-size:12px;font-weight:900;cursor:pointer">'+t('newWorkout')+'</button></div>':'';
  const modBadges=S.wMods.map(badge).join(' ');
  return '<div style="min-height:100vh;padding-bottom:80px"><div class="sticky" style="padding:13px 16px 11px;border-bottom:1px solid #231E15"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px"><button onclick="navTo(home)" style="background:none;color:#9C8F80;font-size:22px;padding:0 4px">←</button><div style="text-align:center"><div style="font-size:13px;font-weight:900;letter-spacing:1px">'+S.wTitle+'</div><div style="font-size:9px;color:#9C8F80">'+S.wSub+'</div></div>'+(S.isPre?'<div style="width:26px"></div>':'<button onclick="doRegen()" style="background:none;color:#9C8F80;font-size:18px;padding:0 4px">↺</button>')+'</div><div style="background:#272118;border-radius:99px;height:3px;overflow:hidden"><div style="height:100%;background:'+(allDone?'#2ED573':'#fff')+';width:'+pct+'%;transition:width 0.4s;border-radius:99px"></div></div><div style="display:flex;justify-content:space-between;margin-top:5px"><div style="display:flex;flex-wrap:wrap;gap:4px">'+modBadges+'</div><span style="font-size:10px;color:#6E6050">'+comp+'/'+tot+'</span></div></div><div style="padding:11px 14px">'+stHtml+compHtml+'</div></div>';
}

function render(){
  const root=document.getElementById('root');
  const sc=window.scrollY;
  if(S.screen==='home')root.innerHTML=homeScreen();
  else if(S.screen==='lib')root.innerHTML=libScreen();
  else if(S.screen==='setup')root.innerHTML=setupScreen();
  else if(S.screen==='workout')root.innerHTML=workoutScreen();
  else if(S.screen==='cal')root.innerHTML=calScreen();
  else if(S.screen==='legit')root.innerHTML=legitScreen();
  if(S.screen==='workout')setTimeout(()=>window.scrollTo(0,sc),0);
}
render();
</script>
</body>
</html>
